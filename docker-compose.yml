services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ai_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://user:password@db:5432/ai_db
    depends_on:
      - db

volumes:
  postgres_data:
